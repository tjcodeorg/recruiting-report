name: Weekly Recruiting Report

on:
  schedule:
     - cron: "0 12 * * 5"
  workflow_dispatch:

jobs:
  send-report:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Write Gmail token from secret
        run: echo '${{ secrets.GMAIL_TOKEN }}' > token.json

      - name: Write Gmail credentials from secret
        run: echo '${{ secrets.GMAIL_CREDENTIALS }}' > credentials.json

      - name: Run report
        env:
          GH_CLIENT_ID: ${{ secrets.GH_CLIENT_ID }}
          GH_CLIENT_SECRET: ${{ secrets.GH_CLIENT_SECRET }}
          GH_USER_ID: ${{ secrets.GH_USER_ID }}
          SENDER_EMAIL: ${{ secrets.SENDER_EMAIL }}
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
        run: python report.py
